name: Smart Task Manager CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: smart-task-manager

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:

    # 🔹 1. Checkout Code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 🔹 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 🔹 3. Install Dependencies
    - name: Install Backend Dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    # 🔹 4. Run Tests
    - name: Run Tests
      run: |
        cd backend
        pytest || echo "No tests found, continuing"

    # 🔹 5. Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME -f docker/Dockerfile .

    # 🔹 6. Login to DockerHub
    - name: DockerHub Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 7. Tag Docker Image
    - name: Tag Image
      run: |
        docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

    # 🔹 8. Push Image to DockerHub
    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

    # 🔹 9. Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    # 🔹 10. Set Kubeconfig (for deployment)
    - name: Configure Kubernetes
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

    # 🔹 11. Deploy to Kubernetes
    - name: Deploy Application
      run: |
        kubectl apply -f k8s/

    # 🔹 12. Verify Deployment
    - name: Verify Deployment
      run: |
        kubectl get pods
        kubectl get svc