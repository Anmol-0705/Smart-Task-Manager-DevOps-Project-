apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-app
  template:
    metadata:
      labels:
        app: task-app
    spec:
      containers:
        - name: task-app
          image: docker-app:latest
          imagePullPolicy: Never   # 🔥 VERY IMPORTANT
          ports:
            - containerPort: 5000